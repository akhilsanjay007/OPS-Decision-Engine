services:
  - type: web
    name: ops-decision-engine-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./Dockerfile
    dockerCommand: sh -c "uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    disks:
      - name: chroma-data
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: APP_HOME
        value: /app
      - key: MODEL_PATH
        value: /app/models/priority_stage5_svm_pipeline.joblib
      - key: CHROMA_DIR
        value: /var/data/chroma
      - key: KB_PATH
        value: /app/data/processed/rag_knowledge_base.jsonl
